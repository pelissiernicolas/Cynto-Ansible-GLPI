# inventories/prod/group_vars/glpi/apache_php.yml
---
php_packages:
  - apache2
  - php
  - libapache2-mod-php
  - php-mysql
  - php-curl
  - php-gd
  - php-intl
  - php-ldap
  - php-apcu
  - php-xml
  - php-mbstring
  - php-zip
  - php-bz2
  - php-imap
  - php-bcmath
  - php-cli

php_version: "8.3"
php_session_cookie_secure: "On"
