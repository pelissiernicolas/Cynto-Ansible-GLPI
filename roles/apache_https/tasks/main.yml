# roles/apache_https/tasks/main.yml
---
- name: Installer les paquets SSL Apache
  ansible.builtin.apt:
    name:
      - openssl
      - ssl-cert
    state: present
    update_cache: true

- name: Générer la clé privée SSL GLPI
  community.crypto.openssl_privatekey:
    path: "{{ ssl_key_path }}"
    size: 2048
    type: RSA
    owner: root
    group: root
    mode: "0600"

- name: Générer la CSR SSL GLPI
  community.crypto.openssl_csr:
    path: "{{ ssl_csr_path }}"
    privatekey_path: "{{ ssl_key_path }}"
    country_name: "{{ ssl_country }}"
    state_or_province_name: "{{ ssl_state }}"
    locality_name: "{{ ssl_locality }}"
    organization_name: "{{ ssl_organization }}"
    organizational_unit_name: "{{ ssl_organizational_unit }}"
    common_name: "{{ ssl_common_name }}"
    subject_alt_name:
      - "DNS:{{ glpi_server_name }}"
      - "DNS:{{ server_hostname }}"
      - "IP:{{ server_ip_cidr.split('/')[0] }}"
    owner: root
    group: root
    mode: "0644"

- name: Générer le certificat autosigné SSL GLPI
  community.crypto.x509_certificate:
    path: "{{ ssl_cert_path }}"
    privatekey_path: "{{ ssl_key_path }}"
    csr_path: "{{ ssl_csr_path }}"
    provider: selfsigned
    selfsigned_not_after: "+{{ ssl_days }}d"
    owner: root
    group: root
    mode: "0644"
  notify: Reload Apache

- name: Activer les modules Apache nécessaires
  ansible.builtin.command: "a2enmod {{ item }}"
  loop:
    - ssl
    - headers
    - rewrite
  register: apache_ssl_mods
  changed_when: "'already enabled' not in apache_ssl_mods.stdout"
  notify: Reload Apache

- name: Déployer le vhost HTTP avec redirection HTTPS
  ansible.builtin.template:
    src: glpi-http.conf.j2
    dest: /etc/apache2/sites-available/glpi.conf
    mode: "0644"
  notify: Reload Apache

- name: Déployer le vhost HTTPS GLPI
  ansible.builtin.template:
    src: glpi-ssl.conf.j2
    dest: /etc/apache2/sites-available/glpi-ssl.conf
    mode: "0644"
  notify: Reload Apache

- name: Activer le site HTTP GLPI
  ansible.builtin.command: a2ensite glpi.conf
  register: enable_http_site
  changed_when: "'enabled' in enable_http_site.stdout"
  notify: Reload Apache

- name: Activer le site HTTPS GLPI
  ansible.builtin.command: a2ensite glpi-ssl.conf
  register: enable_https_site
  changed_when: "'enabled' in enable_https_site.stdout"
  notify: Reload Apache

- name: Vérifier la configuration Apache
  ansible.builtin.command: apache2ctl configtest
  changed_when: false